<!DOCTYPE html>
<html>
<head>
  <title>Chat UI</title>
  <script src="https://cdn.socket.io/4.7.1/socket.io.min.js"></script>

  <style>
    body {
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      background: #f0f2f5;
    }

    .container {
      display: flex;
      width: 80%;
      height: 80vh;
    }

    /* LEFT PANEL */
    #left-panel {
      width: 25%;
      border-right: 1px solid #ccc;
      background: white;
      display: flex;
      flex-direction: column;
    }

    #search-box {
      padding: 10px;
      border-bottom: 1px solid #ccc;
    }

    #searchInput {
      width: 65%;
      padding: 5px;
    }

    #searchBtn {
      padding: 5px 10px;
      cursor: pointer;
    }

    #users {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      list-style: none;
    }

    #users li {
      cursor: pointer;
      padding: 8px;
      border-bottom: 1px solid #eee;
    }

    #users li:hover {
      background: #f5f5f5;
    }

    /* RIGHT CHAT */
    .chat-box {
      width: 75%;
      display: flex;
      flex-direction: column;
      background: white;
    }

    .top-bar {
      padding: 10px;
      border-bottom: 1px solid #ccc;
      background: #fafafa;
    }

    #history {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      list-style: none;
      display: flex;
      flex-direction: column;
    }

    .message {
      margin-bottom: 10px;
      padding: 8px 12px;
      border-radius: 10px;
      max-width: 60%;
      word-wrap: break-word;
    }

    .my-message {
      align-self: flex-end;
      background: #0084ff;
      color: white;
    }

    .other-message {
      align-self: flex-start;
      background: #e4e6eb;
      color: black;
    }

    .time {
      font-size: 10px;
      opacity: 0.7;
      margin-top: 4px;
    }

    .input-box {
      display: flex;
      border-top: 1px solid #ccc;
      padding: 10px;
    }

    #messageInput {
      flex: 1;
      padding: 10px;
      border-radius: 5px;
      border: 1px solid #ccc;
    }

    #sendBtn {
      margin-left: 10px;
      padding: 10px 20px;
      border: none;
      background: #0084ff;
      color: white;
      border-radius: 5px;
      cursor: pointer;
    }

    #sendBtn:hover {
      background: #006edc;
    }

    .me-box {
      font-weight: bold;
    }

    .me-uid {
      font-size: 12px;
      color: gray;
    }

    .logout-btn {
      margin-top: 5px;
      padding: 5px 10px;
      border: none;
      background: red;
      color: white;
      cursor: pointer;
      border-radius: 5px;
    }
  </style>
</head>

<body>

<div class="container">

  <!-- LEFT PANEL -->
  <div id="left-panel">
    <div id="search-box">
      <input type="text" id="searchInput" placeholder="Search by UID" />
      <button id="searchBtn">Search</button>
    </div>
    <ul id="users"></ul>
  </div>

  <!-- CHAT BOX -->
  <div class="chat-box">

    <div class="top-bar">
      <div id="me"></div>
      <button class="logout-btn" onclick="logout()">Logout</button>
    </div>

    <ul id="history"></ul>

    <div class="input-box">
      <input type="text" id="messageInput" placeholder="Type a message" />
      <button id="sendBtn">Send</button>
    </div>

  </div>

</div>

<script>
  const token = localStorage.getItem("token");

  if (!token) {
    window.location.href = "login.html";
  }

  function logout() {
    localStorage.removeItem("token");
    window.location.href = "login.html";
  }

  const socket = io("http://localhost:5000", {
    auth: { token }
  });

  let selecteduser = null;
  let username = null;

  function selectUser(user) {
    selecteduser = user;
    document.getElementById("history").innerHTML = "";
    socket.emit("load_messages", user);
  }

  // ✅ AFTER LOGIN
  socket.once("me", (data) => {
    username = data.username;

    document.getElementById("me").innerHTML = `
      <div class="me-box">You: ${data.username}</div>
      <div class="me-uid">${data.uid}</div>
    `;

    socket.emit("get_my_chats");
  });

  // ✅ LOAD CHAT USERS ONLY
  socket.on("my_chats", (users) => {
    const list = document.getElementById("users");
    list.innerHTML = "";

    if (users.length === 0) {
      const li = document.createElement("li");
      li.textContent = "No chats yet";
      list.appendChild(li);
      return;
    }

    users.forEach((user) => {
      const li = document.createElement("li");
      li.textContent = user;
      li.onclick = () => selectUser(user);
      list.appendChild(li);
    });
  });

  // ✅ SEARCH BUTTON
  document.getElementById("searchBtn").onclick = () => {
    const uid = document.getElementById("searchInput").value.trim();
    if (!uid) return;

    socket.emit("search_user", uid);
  };

  // ✅ SEARCH RESULT
  socket.on("search_result", (data) => {
    const list = document.getElementById("users");
    list.innerHTML = "";

    if (!data.found) {
      const li = document.createElement("li");
      li.textContent = "No user found";
      list.appendChild(li);
      return;
    }

    const li = document.createElement("li");
    li.innerHTML = `
      <div class="username">${data.user.username}</div>
      <div class="uid">${data.user.uid}</div>
    `;

    li.onclick = () => selectUser(data.user.username);
    list.appendChild(li);
  });

  // ✅ SEND MESSAGE
  document.getElementById("sendBtn").onclick = () => {
    const msg = document.getElementById("messageInput").value;

    if (!selecteduser) {
      alert("Select a user first");
      return;
    }

    if (!msg.trim()) return;

    socket.emit("private_message", {
      to: selecteduser,
      message: msg,
    });

    document.getElementById("messageInput").value = "";
  };

  // ✅ ADD MESSAGE
  function addMessage(data, isMe, time) {
    const ul = document.getElementById("history");

    const li = document.createElement("li");
    li.classList.add("message");

    if (isMe) {
      li.classList.add("my-message");
    } else {
      li.classList.add("other-message");
    }

    li.innerHTML = `
      ${data.message}
      <div class="time">${time}</div>
    `;

    ul.appendChild(li);
    ul.scrollTop = ul.scrollHeight;
  }

  // ✅ RECEIVE MESSAGE
  socket.on("receive_message", (data) => {
    const isMe = data.from === username;
    const time = new Date().toLocaleTimeString();

    addMessage(data, isMe, time);
  });

  // ✅ CHAT HISTORY
  socket.on("chat_history", (messages) => {
    const ul = document.getElementById("history");
    ul.innerHTML = "";

    messages.forEach((msg) => {
      const isMe = msg.from === username;
      const time = new Date(msg.time).toLocaleTimeString();

      addMessage(msg, isMe, time);
    });
  });
</script>

</body>
</html>
